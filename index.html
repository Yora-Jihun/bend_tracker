<!DOCTYPE html>
<html>

<head>
    <title>User Info Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            padding: 2rem;
        }

        h1 {
            color: #4cafef;
        }

        pre {
            background: #222;
            padding: 1rem;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <h1>User Info</h1>
    <pre id="output">Loading...</pre>

    <script>
        async function getUserInfo() {
            let combined = {};

            // IP info
            try {
                const res = await fetch("https://ipinfo.io/json?token=5779678ae682d8");
                const ipData = await res.json();
                combined.ipinfo = ipData;
            } catch {
                combined.ipinfo = { error: "IP lookup failed" };
            }

            // Device info
            combined.device = navigator.userAgent;

            // GPS
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async pos => {
                        combined.gps = {
                            latitude: pos.coords.latitude,
                            longitude: pos.coords.longitude
                        };

                        // Show in browser
                        document.getElementById("output").textContent =
                            JSON.stringify(combined, null, 2);

                        // ✅ Send to backend for logging
                        await fetch("http://localhost:3000/log", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(combined)
                        });
                    }
                );
            }
        }
        getUserInfo();
    </script>

    </script>
</body>

</html>
